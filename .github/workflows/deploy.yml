name: Deploy EJBM Production Portal

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Upload Finished Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: .  # This tells the robot to look at your main folder!

      - name: Publish Live to GitHub Pages CDN
        id: deployment
        uses: actions/deploy-pages@v4
